server:
  port: 9090
  servlet:
    context-path: /

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/zzylai?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
      password: ${REDIS_PASSWORD:}
  ai:
    openai:
      api-key: ${SPRING_AI_OPENAI_API_KEY:replace-me}
      base-url: ${SPRING_AI_OPENAI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${SPRING_AI_OPENAI_CHAT_MODEL:deepseek-chat}

aliyun:
  endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-cn-wuhan-lr.aliyuncs.com}
  accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:}
  accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
  bucketName: ${ALIYUN_OSS_BUCKET_NAME:demo-bucket}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: cn.yangeit.pojo
  global-config:
    db-config:
      logic-delete-field: isDeleted
      id-type: auto

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.entity
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
  rag:
    enabled: ${APP_RAG_ENABLED:true}
    vector-enabled: ${APP_RAG_VECTOR_ENABLED:false}
    vector-provider: ${APP_RAG_VECTOR_PROVIDER:simple}
    top-k: ${APP_RAG_TOP_K:3}
    keyword-limit: ${APP_RAG_KEYWORD_LIMIT:3}
    embedding-dimension: ${APP_RAG_EMBEDDING_DIMENSION:1536}
    milvus:
      uri: ${APP_RAG_MILVUS_URI:}
      host: ${APP_RAG_MILVUS_HOST:localhost}
      port: ${APP_RAG_MILVUS_PORT:19530}
      token: ${APP_RAG_MILVUS_TOKEN:}
      database-name: ${APP_RAG_MILVUS_DATABASE_NAME:default}
      collection-name: ${APP_RAG_MILVUS_COLLECTION_NAME:fresh_customer_service_knowledge}
      index-type: ${APP_RAG_MILVUS_INDEX_TYPE:AUTOINDEX}
      metric-type: ${APP_RAG_MILVUS_METRIC_TYPE:COSINE}
      index-parameters: ${APP_RAG_MILVUS_INDEX_PARAMETERS:}
      initialize-schema: ${APP_RAG_MILVUS_INITIALIZE_SCHEMA:true}
      search-params-json: ${APP_RAG_MILVUS_SEARCH_PARAMS_JSON:}

wechat:
  app-id: ${WECHAT_APP_ID:replace-me}
  app-secret: ${WECHAT_APP_SECRET:replace-me}

ip: localhost
